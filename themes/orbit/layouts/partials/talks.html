<section class="section talks-section">
    <h2 class="section-title"><i class="fa {{ .Site.Params.talks.icon }}"></i>{{ i18n "talks" }}</h2>

    {{ range .Site.Params.talks.list }}
    <div class="li-item">
        <div class="meta">
            <div class="li-time">
                {{ with .date }}{{ . | markdownify }}{{ end }}
            </div>
            <div class="li-title">
                <a href="{{ .url }}">{{ .title }}</a>
            </div>
            <div class="li-detail">
                <span class="talk-type">{{ .type }}</span>
                <span class="talk-location">{{ .location }}</span>
            </div>
        </div><!--//meta-->
    </div><!--//item-->
    {{ end }}
</section><!--//section-->
